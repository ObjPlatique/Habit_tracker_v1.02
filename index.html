<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habit Tracker</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="settings-bar">
    <select id="languageSelect"></select>

    <select id="timezoneSelect">
        <option value="Asia/Ho_Chi_Minh">VN</option>
    </select>

    <button id="autoDetectBtn">Auto Detect</button>

    <label>🌙</label>
    <input type="checkbox" id="darkModeToggle">
</div>

<div class="container">

<header>
    <h1>Habit Tracker</h1>
</header>

<div class="input-section">
    <input id="habitInput" placeholder="New habit">
    <select id="categorySelect">
        <option value="health">Health</option>
        <option value="learning">Learning</option>
        <option value="productivity">Productivity</option>
    </select>

    <input type="number" id="goalInput" placeholder="Goal">
    <input type="time" id="reminderInput">

    <button id="addBtn">Add</button>
</div>

<div id="dailyGrid"></div>

</div>

<!-- DAY MODAL -->
<div id="dayDetailsModal" class="modal">
    <div class="modal-content">
        <h2 id="detailsDate"></h2>

        <textarea id="dayNote"></textarea>
        <button id="saveNoteBtn">Save Note</button>
    </div>
</div>

<script src="languages.js"></script>
<script src="script.js"></script>

</body>
</html>
